server {
    listen 80;
    server_name fotokatalog.dev.local;

    client_max_body_size 20m;

    access_log /var/log/nginx/fotokatalog_access.log;
    error_log /var/log/nginx/fotokatalog_error.log;

    location /static/ {
        alias /srv/fotokatalog/app/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /previews/ {
        alias /srv/fotokatalog/_previews/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # /api/preview/{id} → Nginx bedient direkt aus _previews/, kein Python-Overhead
    # Fallback auf Python wenn Datei nicht existiert (liefert dann Thumbnail-BLOB)
    location ~ ^/api/preview/(\d+)$ {
        alias /srv/fotokatalog/_previews/$1.jpg;
        expires 7d;
        add_header Cache-Control "public";
        try_files "" @backend;
    }

    location @backend {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}
